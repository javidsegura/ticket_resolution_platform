services:
  database:
    image: mysql:8.0
    tmpfs:
      - /var/lib/mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "rootpassword"
      MYSQL_DATABASE: "ai_ticket_platform"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5

  firebase-emulator:
    image: evolutecx/firebase-emulator:latest
    ports:
      - 14000:4000
      - 19099:9099
    environment:
      - FB_PROJECT_ID=ai-ticket-platform

volumes:
  redis-data:
